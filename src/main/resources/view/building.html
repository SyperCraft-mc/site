<!doctype html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SyperCraft — En construction</title>
    <link rel="stylesheet" href="/assets/style.css" />
    <script src="/assets/tailwind.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: { fontFamily: { display: ["Cinzel", "serif"], mono: ['"JetBrains Mono"', "monospace"] } },
            },
        };
    </script>
    <style>
        @keyframes forge-pulse {
            0%,
            100% {
                opacity: 0.18;
                transform: translateX(-50%) scaleX(1);
            }
            50% {
                opacity: 0.35;
                transform: translateX(-50%) scaleX(1.08);
            }
        }
        @keyframes rune-spin {
            to {
                transform: rotate(360deg);
            }
        }
        @keyframes rune-rev {
            to {
                transform: rotate(-360deg);
            }
        }
        @keyframes flicker {
            0%,
            100% {
                opacity: 1;
            }
            48% {
                opacity: 1;
            }
            50% {
                opacity: 0.4;
            }
            52% {
                opacity: 1;
            }
            78% {
                opacity: 1;
            }
            80% {
                opacity: 0.6;
            }
            82% {
                opacity: 1;
            }
        }
        @keyframes progress-fill {
            from {
                width: 0;
            }
            to {
                width: var(--pct);
            }
        }
        @keyframes float-block {
            0%,
            100% {
                transform: translateY(0) rotate(0deg);
            }
            33% {
                transform: translateY(-10px) rotate(1.5deg);
            }
            66% {
                transform: translateY(-5px) rotate(-1deg);
            }
        }
        @keyframes scanline {
            0% {
                top: -10%;
            }
            100% {
                top: 110%;
            }
        }
        @keyframes type-cursor {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0;
            }
        }

        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            justify-content: center;
            align-items: center;
        }

        /* Forge glow au sol */
        .forge-glow {
            position: fixed;
            bottom: -60px;
            left: 50%;
            transform: translateX(-50%);
            width: 700px;
            height: 160px;
            background: radial-gradient(ellipse, rgba(249, 115, 22, 0.22), transparent 70%);
            filter: blur(40px);
            animation: forge-pulse 4s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }

        /* Scanline effect */
        .scanline {
            position: fixed;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(249, 115, 22, 0.08), transparent);
            animation: scanline 6s linear infinite;
            pointer-events: none;
            z-index: 2;
        }

        /* Grille de fond */
        .bg-grid {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background-image: linear-gradient(rgba(249, 115, 22, 0.025) 1px, transparent 1px),
            linear-gradient(90deg, rgba(249, 115, 22, 0.025) 1px, transparent 1px);
            background-size: 60px 60px;
            mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
        }

        /* Bloc Minecraft flottant */
        .mc-block {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, #2a1f14 0%, #1a1209 50%, #241a10 100%);
            border: 1px solid rgba(249, 115, 22, 0.25);
            position: relative;
            image-rendering: pixelated;
            animation: float-block 5s ease-in-out infinite;
            box-shadow:
                    inset -4px -4px 0 rgba(0, 0, 0, 0.4),
                    inset 4px 4px 0 rgba(255, 255, 255, 0.06),
                    0 0 24px rgba(249, 115, 22, 0.12);
        }
        .mc-block::before {
            content: "⚒";
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            filter: drop-shadow(0 0 6px rgba(249, 115, 22, 0.6));
        }
        /* faces isométriques */
        .mc-block::after {
            content: "";
            position: absolute;
            top: -4px;
            right: -4px;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, #3a2a18, #2a1f14);
            transform-origin: bottom left;
            transform: skewX(-45deg);
            border-top: 1px solid rgba(249, 115, 22, 0.2);
        }

        /* Cercles runiques */
        .rune-ring {
            position: absolute;
            border-radius: 50%;
            border: 1px solid;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }
        .rr1 {
            width: 280px;
            height: 280px;
            border-color: rgba(249, 115, 22, 0.08);
            animation: rune-spin 30s linear infinite;
        }
        .rr2 {
            width: 220px;
            height: 220px;
            border-color: rgba(249, 115, 22, 0.12);
            animation: rune-rev 20s linear infinite;
        }
        .rr3 {
            width: 160px;
            height: 160px;
            border-color: rgba(249, 115, 22, 0.06);
            animation: rune-spin 15s linear infinite;
        }

        /* Rune glyphs sur les cercles */
        .rune-glyph {
            position: absolute;
            width: 14px;
            height: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.55rem;
            color: rgba(249, 115, 22, 0.4);
            font-family: "Cinzel", serif;
        }

        /* Barre de progression */
        .prog-track {
            width: 380px;
            height: 3px;
            background: rgba(249, 115, 22, 0.08);
            position: relative;
            overflow: hidden;
        }
        .prog-fill {
            --pct: 68%;
            height: 100%;
            background: linear-gradient(90deg, #c85a0a, #f97316, #fb923c);
            width: 0;
            animation: progress-fill 2s cubic-bezier(0.4, 0, 0.2, 1) 1s forwards;
            position: relative;
        }
        .prog-fill::after {
            content: "";
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 4px;
            height: 4px;
            background: #fb923c;
            box-shadow: 0 0 8px #f97316;
        }
        .prog-track::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(249, 115, 22, 0.15), transparent);
            animation: scanline 2s linear infinite;
        }

        /* Typing text */
        .typing::after {
            content: "|";
            animation: type-cursor 1s step-end infinite;
            color: var(--e);
        }

        /* Corners déco */
        .deco-corner {
            position: absolute;
            width: 20px;
            height: 20px;
        }
        .dc-tl {
            top: 0;
            left: 0;
            border-top: 1px solid var(--e);
            border-left: 1px solid var(--e);
            opacity: 0.4;
        }
        .dc-tr {
            top: 0;
            right: 0;
            border-top: 1px solid var(--e);
            border-right: 1px solid var(--e);
            opacity: 0.4;
        }
        .dc-bl {
            bottom: 0;
            left: 0;
            border-bottom: 1px solid var(--e);
            border-left: 1px solid var(--e);
            opacity: 0.4;
        }
        .dc-br {
            bottom: 0;
            right: 0;
            border-bottom: 1px solid var(--e);
            border-right: 1px solid var(--e);
            opacity: 0.4;
        }

        /* Particles extras */
        .spark {
            position: fixed;
            border-radius: 50%;
            background: var(--e);
            pointer-events: none;
            z-index: 1;
            animation: float-block var(--dur) ease-in-out infinite;
            opacity: 0.15;
        }
    </style>
</head>
<body>

<!-- Contenu central -->
<div class="relative z-10 flex flex-col items-center text-center cst-wrap">
    <!-- Cercles runiques + bloc -->
    <div class="relative flex items-center justify-center mb-10 cst-logo-ring">
        <div class="rune-ring rr1" id="rr1"></div>
        <div class="rune-ring rr2" id="rr2"></div>
        <div class="rune-ring rr3"></div>
        <img src="https://avatars.githubusercontent.com/u/94019278?s=200&v=4" alt="">
    </div>

    <!-- Badge statut -->
    <div class="cst-status-badge">
        <span class="cst-diamond ab"></span>
        FORGE EN COURS
        <span class="cst-diamond ab"></span>
    </div>

    <!-- Titre -->
    <div class="cst-eyebrow">
        — PAGE EN CONSTRUCTION —
    </div>

    <div class="cst-h1-wrap">
        <div class="deco-corner dc-tl"></div>
        <div class="deco-corner dc-tr"></div>
        <div class="deco-corner dc-bl"></div>
        <div class="deco-corner dc-br"></div>
        <h1 class="cst-h1">Les forgerons<br /><em class="em-accent">travaillent.</em>
        </h1>
    </div>

    <p class="cst-p">
        Cette section du Royaume est en cours de construction.<br />
        Nos artisans y travaillent jour et nuit — revenez bientôt.
    </p>

    <!-- Rejoindre discord -->
    <a href="https://discord.gg/KzBXBHEHv7" target="_blank" class="disc-btn">
        <svg width="16" height="12" viewBox="0 0 71 55" fill="currentColor">
            <path d="M60.1 4.9A58.5 58.5 0 0045.7.4a.2.2 0 00-.2.1 40.7 40.7 0 00-1.8 3.7 54.1 54.1 0 00-16.2 0A37.8 37.8 0 0025.7.5a.2.2 0 00-.2-.1A58.4 58.4 0 0010.9 4.9a.2.2 0 00-.1.1C1.6 18.4-.9 31.6.3 44.5a.3.3 0 00.1.2 58.8 58.8 0 0017.7 8.9.2.2 0 00.3-.1 41.6 41.6 0 003.6-5.8.2.2 0 00-.1-.3 38.7 38.7 0 01-5.5-2.6.2.2 0 010-.3l1.1-.9a.2.2 0 01.2 0c11.5 5.3 24 5.3 35.4 0a.2.2 0 01.2 0l1.1.9a.2.2 0 010 .3 36 36 0 01-5.5 2.6.2.2 0 00-.1.3c1.1 2 2.3 3.9 3.6 5.8a.2.2 0 00.3.1 58.6 58.6 0 0017.7-8.9.2.2 0 00.1-.2c1.5-15.3-2.5-28.5-10.5-40.2a.2.2 0 00-.1-.2z"></path>
        </svg>
        Rejoindre le serveur
    </a>
</div>

<script src="/assets/main.js"></script>
</body>
</html>
