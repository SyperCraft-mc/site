{% extends "view/layout/admin.html" %}
{% block content %}
<div class="topbar">
    <div class="topbar-left">
        <div class="tb-title">Dashboard</div>
        <div class="tb-crumb">Vue d'ensemble</div>
    </div>
</div>

<div class="content">
    <div class="stats-grid stats-3 mb-22">
        <div class="stat-mini">
            <div class="sm-val" data-target="{{ allPlayers }}"></div>
            <div class="sm-label">Joueurs inscrits</div>
        </div>
        <div class="stat-mini">
            <div class="sm-val" data-target="{{ allPlayerOnline }}"></div>
            <div class="sm-label">Joueurs en ligne</div>
        </div>
        <div class="stat-mini">
            <div class="sm-val" data-target="0"></div>
            <div class="sm-label">Factions</div>
        </div>
    </div>
</div>
{% endblock %}
